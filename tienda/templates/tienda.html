{% extends 'ProyectoWebApp/base.html' %}
{% load static %}
{% block content %}
{% load humanize %}
<div class="container"> 
  <div style="float: right ;">
    <p style="color: white;">zona carrito</p>
     {% include "carro/widget.html" %}
  </div> 
 
<div class="row">

{% for pro in productos%}

<div class="card" style="width: 20%; margin:  5px 5px;">
  {% if pro.imagen %}
  <img style="width: 200px; height: 200px; display: block; margin: 0 auto;"   class="card-img-top" src="{{ pro.imagen.url }}" alt="{{ pro.nombre }}">
  {% endif %}
  <div class="card-body" style="margin: 10px;">
    <h5 class="card-title" style="text-align: center;">{{ pro.nombre }}</h5>
    <p class="card-text"style="text-align: center;">{{ pro.categoria }}</p>
    <a href="{% url 'carro:agregar' pro.id %}" class="btn btn-primary" style="display: block; margin: 0 auto;">Carrito</a>
  </div>
</div>
{% endfor %}
  
</div>
</div> 
<!-- container -->
{% endblock %}
